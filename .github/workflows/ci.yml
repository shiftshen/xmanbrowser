name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Create venv & install
        run: |
          uv venv --python 3.12 .venv
          source .venv/bin/activate
          uv pip install -e . pytest
      - name: Run tests (no browser launch)
        run: |
          source .venv/bin/activate
          python -m pytest -q

  ui:
    name: UI (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci || npm install
      - run: npm test
      - run: npm run build

  tauri:
    name: Tauri shell (cargo check)
    runs-on: macos-14
    defaults:
      run:
        working-directory: ui/src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ui/src-tauri
      - name: Create resource placeholder for cargo-only validation
        run: |
          mkdir -p sidecar
          touch sidecar/ci-placeholder.txt
      - run: cargo check
