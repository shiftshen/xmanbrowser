name: Desktop build

# Builds the XMan desktop shell for macOS + Windows.
# Trigger manually (Actions ▸ Desktop build ▸ Run) or on a version tag.
# NOTE: this bundles the Tauri shell + UI only. The Python/Camoufox backend is
# not yet packaged as a sidecar, so the produced installers expect the backend
# to be available (dev venv or `xman serve`). Sidecar bundling is tracked
# separately.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ui/src-tauri

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build backend sidecar (PyInstaller)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e . pyinstaller
          bash tools/build_sidecar.sh ${{ matrix.target }}

      - name: Install UI deps
        working-directory: ui
        run: npm ci || npm install

      - name: Build desktop bundle
        uses: tauri-apps/tauri-action@v0
        env:
          # macOS code-signing + notarization (optional). Add these repo secrets
          # once you have an Apple Developer account; builds stay unsigned until then.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows code-signing (optional).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ui
          args: --target ${{ matrix.target }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: xman-${{ matrix.target }}
          path: |
            ui/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            ui/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            ui/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            ui/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
          if-no-files-found: ignore
