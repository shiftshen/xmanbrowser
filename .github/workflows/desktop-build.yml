name: Desktop build

# Builds the XMan desktop shell for macOS + Windows.
# Trigger manually (Actions ▸ Desktop build ▸ Run) or on a version tag.
# NOTE: this bundles the Tauri shell + UI only. The Python/Camoufox backend is
# not yet packaged as a sidecar, so the produced installers expect the backend
# to be available (dev venv or `xman serve`). Sidecar bundling is tracked
# separately.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ui/src-tauri

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build backend sidecar (PyInstaller)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e . pyinstaller
          bash tools/build_sidecar.sh ${{ matrix.target }}

      - name: Smoke-test the backend on the real OS
        shell: bash
        run: |
          SIDE="ui/src-tauri/sidecar/xman-server"
          [ -f "$SIDE.exe" ] && SIDE="$SIDE.exe"
          # XMAN_API_OPEN=1 disables the browser-origin guard (custom header +
          # Host check) for this trusted in-CI smoke test; never set in releases.
          XMAN_PORT=8799 XMAN_API_OPEN=1 "$SIDE" &
          SPID=$!
          ok=
          for i in $(seq 1 40); do
            if curl -sf http://127.0.0.1:8799/api/health >/dev/null 2>&1; then ok=1; break; fi
            sleep 1
          done
          [ -n "$ok" ] || { echo "sidecar did not come up"; exit 1; }
          curl -sf http://127.0.0.1:8799/api/health | grep -q '"ok":true'
          curl -sf -X POST http://127.0.0.1:8799/api/profiles \
            -H 'content-type: application/json' -d '{"os":"windows","engine":"chromium"}' | grep -q '"name"'
          curl -sf http://127.0.0.1:8799/api/engine/status | grep -q chromium
          kill $SPID 2>/dev/null || true
          echo "✅ backend smoke test passed on ${{ matrix.os }}"

      - name: Install UI deps
        working-directory: ui
        run: npm ci || npm install

      # macOS builds are ad-hoc signed via tauri.conf (bundle.macOS.signingIdentity
      # = "-"), so they run on Apple Silicon without a developer account. To ship
      # NOTARIZED, warning-free releases later: add the Apple Developer secrets
      # (APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
      # APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID) and re-add them to this step's env.
      # (They must NOT be passed empty — tauri-action then tries `security import`
      # on an empty cert and fails.)
      - name: Build desktop bundle
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: ui
          args: --target ${{ matrix.target }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: xman-${{ matrix.target }}
          path: |
            ui/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            ui/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            ui/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            ui/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
          if-no-files-found: ignore
